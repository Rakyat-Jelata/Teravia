<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - TERAVIA</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary: #0F172A;       /* Deep Slate / Navy */
            --accent: #0EA5E9;        /* Premium Sky Blue */
            --accent-hover: #0284C7;
            --bg-main: #FAFAFA;
            --bg-surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #F8FAFC;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        /* CARD INTEGRATION STYLE COPIED FROM LOGIN */
        .auth-container {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border-color);
        }

        .back-to-home {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 32px;
            transition: color 0.3s;
        }
        .back-to-home:hover { color: var(--accent); }

        /* FIX LOGO GEPLAK / GEPENG */
        .logo-container {
            margin-bottom: 32px;
        }
        .logo-img {
            height: 40px;      /* Mengunci tinggi logo agar konsisten */
            width: auto;       /* Membiarkan lebar menyesuaikan secara proporsional */
            display: block;
        }

        .auth-header h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .auth-header p {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* FORM FIELD LAYOUT */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .form-group input {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
            background-color: #F8FAFC;
            width: 100%;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            background-color: #ffffff;
        }

        /* PASSWORD CONTAINER WITH EYE ICON */
        .password-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-field-wrapper input {
            padding-right: 48px;
        }
        .toggle-password-btn {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
            user-select: none;
        }
        .toggle-password-btn:hover {
            color: var(--text-main);
        }

        /* ACTION BUTTON */
        .btn-submit {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 12px;
        }
        .btn-submit:hover { background-color: var(--accent-hover); }

        .auth-redirect {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 24px;
        }
        .auth-redirect a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-redirect a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="back-to-home">← Beranda</a>
        
        <div class="logo-container">
            <img src="./assets/img/logo.png" alt="TERAVIA Logo" class="logo-img">
        </div>

        <div class="auth-header">
            <h2>Selamat Datang</h2>
            <p>Daftarkan akun Anda untuk mulai mengelola properti impian.</p>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="reg-name" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label>Alamat Email</label>
                <input type="email" id="reg-email" placeholder="nama@email.com" required>
            </div>

            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" id="reg-whatsapp" placeholder="Contoh: 081234567xxx" required>
            </div>

            <div class="form-group">
                <label>Kata Sandi</label>
                <div class="password-field-wrapper">
                    <input type="password" id="reg-password" placeholder="Minimal 8 karakter" required>
                    <i class="fa-solid fa-eye-slash toggle-password-btn" id="toggle-password-icon"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit">Daftar Sekarang</button>
        </form>

        <p class="auth-redirect">Sudah memiliki akun? <a href="login.html">Masuk</a></p>
    </div>

    <script>
        const passwordField = document.getElementById('reg-password');
        const togglePasswordIcon = document.getElementById('toggle-password-icon');

        togglePasswordIcon.addEventListener('click', function() {
            // Jalankan fungsi switch tipe data atribut input
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                // Ganti kelas ikon mata dari dicoret ke mata terbuka
                togglePasswordIcon.classList.remove('fa-eye-slash');
                togglePasswordIcon.classList.add('fa-eye');
            } else {
                passwordField.type = 'password';
                // Kembalikan ke kelas ikon mata dicoret
                togglePasswordIcon.classList.remove('fa-eye');
                togglePasswordIcon.classList.add('fa-eye-slash');
            }
        });
    </script>

</body>
</html>
