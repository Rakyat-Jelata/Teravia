<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - TERAVIA</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
            padding: 30px;
        }
        .error-code {
            font-size: 96px;
            font-weight: 800;
            color: #2563eb;
            margin: 0;
            line-height: 1;
        }
        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e3a8a;
            margin: 20px 0 10px 0;
        }
        .error-message {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-home:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <div class="error-title">Waduh! Halamannya Ga Ada</div>
        <p class="error-message">Sepertinya link yang kamu tuju salah ketik, sudah dihapus, atau jalurnya belum diinstal kelistrikannya oleh developer TERAVIA.</p>
        <a href="index.html" class="btn-home">Kembali ke Beranda</a>
    </div>

</body>
</html>
