<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERAVIA - Portal Properti Indonesia</title>
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <!-- NAVBAR UTAMA -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-blue-600 tracking-wide">TERAVIA</a>
                </div>
                
                <!-- Desktop Menu (Laptop / PC) -->
                <div class="hidden md:flex items-center space-x-6">
                    <a href="index.html" class="text-blue-600 font-medium">Beranda</a>
                    <a href="properti.html" class="text-slate-600 hover:text-blue-600 font-medium">Properti</a>
                    <a href="blog.html" class="text-slate-600 hover:text-blue-600 font-medium">Blog</a>
                    <a href="tentang.html" class="text-slate-600 hover:text-blue-600 font-medium">Tentang</a>
                    <a href="pasang-iklan.html" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-50">Pasang Iklan</a>
                    <a href="login.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">Masuk</a>
                </div>
                
                <!-- Mobile Hamburger Button (HP) -->
                <div class="flex items-center md:hidden">
                    <button id="index-hamburger" class="text-slate-600 hover:text-slate-900 focus:outline-none p-2">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Dropdown Menu (HP) -->
        <div id="index-mobile-menu" class="hidden md:hidden bg-white border-t border-slate-200 px-4 pt-2 pb-4 space-y-2 shadow-lg">
            <a href="index.html" class="block text-blue-600 py-2 font-medium">Beranda</a>
            <a href="properti.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Properti</a>
            <a href="blog.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Blog</a>
            <a href="tentang.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Tentang</a>
            <a href="pasang-iklan.html" class="block border border-blue-600 text-blue-600 text-center py-2 rounded-lg font-medium bg-blue-50">Pasang Iklan</a>
            <a href="login.html" class="block bg-blue-600 text-white text-center py-2 rounded-lg font-medium hover:bg-blue-700">Masuk</a>
        </div>
    </nav>

    <!-- KONTEN HALAMAN HOME / BERANDA UTAMA KAMU (Taruh di bawah sini) -->
    <main class="max-w-7xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold">Selamat Datang di TERAVIA</h1>
        <p class="text-slate-500 mt-2">Cari properti impian Anda dengan mudah.</p>
    </main>

    <!-- PANGGIL LOGIKA DARI LUAR -->
    <script src="index.js"></script>
</body>
</html>
