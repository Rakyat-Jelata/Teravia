<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - TERAVIA</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <style>
        /* Custom Internal Style Khusus Auth Page agar Terpusat Nyaman */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
        }
        .auth-card {
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
            border: 1px solid var(--border-color);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-header .logo {
            font-size: 28px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .auth-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .auth-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        /* Grid System Dua Kolom untuk Form agar Lebih Ringkas */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background-color: #FAFAFA;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: var(--accent);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
        }
        .terms-text {
            grid-column: span 2;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .terms-text input {
            margin-top: 3px;
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-auth:hover {
            background-color: var(--accent-hover);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        /* Penyesuaian Responsif Mobile */
        @media (max-width: 425px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">TERA<span>VIA</span></a>
                <h1>Bergabung Bersama Kami</h1>
                <p>Mulai pasang iklan dan temukan properti terbaik</p>
            </div>
            
            <form id="register-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="username_anda" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="fullname">Nama Lengkap</label>
                        <input type="text" id="fullname" class="form-control" placeholder="Nama Sesuai KTP" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="whatsapp">Nomor WhatsApp</label>
                        <input type="tel" id="whatsapp" class="form-control" placeholder="0812XXXXXXXX" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="contoh@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-container">
                            <input type="password" id="password" class="form-control" placeholder="Minimal 8 karakter" required>
                            <button type="button" class="toggle-password" data-target="password">LIHAT</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Konfirmasi Password</label>
                        <div class="password-container">
                            <input type="password" id="confirm-password" class="form-control" placeholder="Ulangi password" required>
                            <button type="button" class="toggle-password" data-target="confirm-password">LIHAT</button>
                        </div>
                    </div>
                    
                    <label class="terms-text">
                        <input type="checkbox" id="terms-agree" required>
                        <span>Saya menyetujui <a href="#" style="color: var(--accent); text-decoration: none;">Syarat & Ketentuan</a> serta <a href="#" style="color: var(--accent); text-decoration: none;">Kebijakan Privasi</a> TERAVIA.</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-auth">Daftar Akun Baru</button>
            </form>
            
            <div class="auth-footer">
                Sudah memiliki akun? <a href="login.html">Masuk di Sini</a>
            </div>
        </div>
    </div>

    <script src="assets/js/supabase-config.js" type="module"></script>
    <script src="assets/js/auth.js" type="module"></script>
    
    <script>
        // Logika Interaktif Hide/Show Password Bersama untuk Multi-field
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.textContent = 'SEMBUNYIKAN';
                } else {
                    passwordInput.type = 'password';
                    this.textContent = 'LIHAT';
                }
            });
        });
    </script>
</body>
</html>
