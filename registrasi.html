<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --dark: #0f172a;
            --gray-text: #64748b;
            --gray-light: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--white);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo img {
            height: 28px;
            mix-blend-mode: multiply;
        }

        .auth-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--gray-text);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--gray-light);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-auth {
            width: 100%;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn-auth:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--gray-text);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .alert-success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #86efac;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-logo">
            <img src="https://i.postimg.cc/9Fsm1NKQ/file-00000000a89c71fab7cbee8d44088159.png" alt="TERAVIA Logo">
        </div>
        
        <div class="auth-header">
            <h2>Daftar Akun Baru</h2>
            <p>Bergabunglah untuk mulai menjelajah dan memasang iklan properti.</p>
        </div>

        <div id="alert-msg" class="alert"></div>

        <form id="register-form" onsubmit="return false;">
            <div class="form-group">
                <label for="reg-name">Nama Lengkap</label>
                <input type="text" id="reg-name" class="form-input" placeholder="Masukkan nama lengkap">
            </div>
            <div class="form-group">
                <label for="reg-email">Alamat Email</label>
                <input type="email" id="reg-email" class="form-input" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="reg-phone">Nomor WhatsApp</label>
                <input type="tel" id="reg-phone" class="form-input" placeholder="Contoh: 08123456789">
            </div>
            <div class="form-group">
                <label for="reg-password">Password (Min. 6 Karakter)</label>
                <input type="password" id="reg-password" class="form-input" placeholder="Buat password aman">
            </div>
            <button type="button" id="btn-submit-daftar" class="btn-auth">Daftar Sekarang</button>
        </form>

        <div class="auth-footer">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
    </div>

       <!-- GANTI BLOK SCRIPT PALING BAWAH DENGAN INI -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const SUPABASE_URL = "https://jqlcuilrzfvtdlrbitbn.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxbGN1aWxyemZ2dGRscmJpdGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NzU1MzgsImV4cCI6MjA5OTA1MTUzOH0.FYPFhXvaHupd5O1_JuEJYBmS7zDuzcTq4G2MvYjdqjQ";

            const btnDaftar = document.getElementById("btn-submit-daftar");
            const alertMsg = document.getElementById("alert-msg");

            const showAlert = (message, type = "error") => {
                alertMsg.innerText = message;
                alertMsg.className = `alert alert-${type}`;
                alertMsg.style.display = "block";
            };

            if (btnDaftar) {
                btnDaftar.addEventListener("click", async () => {
                    const fullName = document.getElementById("reg-name").value.trim();
                    const email = document.getElementById("reg-email").value.trim();
                    const phone = document.getElementById("reg-phone").value.trim();
                    const password = document.getElementById("reg-password").value.trim();

                    if (!fullName || !email || !phone || !password) {
                        showAlert("Semua kolom wajib diisi!", "error");
                        return;
                    }

                    btnDaftar.innerText = "Memproses...";
                    btnDaftar.disabled = true;
                    alertMsg.style.display = "none";

                    try {
                        // TEMBAK LANGSUNG KE API AUTH SUPABASE VIA HTTP RAW FETCH
                        const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "apikey": SUPABASE_ANON_KEY,
                                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                            },
                            body: JSON.stringify({ email, password })
                        });

                        const authData = await response.json();

                        if (!response.ok) {
                            throw new Error(authData.msg || authData.message || "Gagal mendaftar auth");
                        }

                        if (authData && authData.id) {
                            // TEMBAK LANGSUNG KE TABEL PROFILES VIA HTTP RAW FETCH
                            const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "apikey": SUPABASE_ANON_KEY,
                                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                                    "Prefer": "return=minimal"
                                },
                                body: JSON.stringify({
                                    id: authData.id,
                                    full_name: fullName,
                                    phone_number: phone,
                                    role: 'user'
                                })
                            });

                            if (!profileResponse.ok) {
                                const profError = await profileResponse.json();
                                throw new Error(profError.message || "Gagal menyimpan data profil");
                            }

                            showAlert("Pendaftaran berhasil! Akun Fufufafa sudah aktif.", "success");
                            document.getElementById("register-form").reset();
                        }

                    } catch (error) {
                        console.error(error);
                        showAlert("Sistem HP Memblokir: " + error.message, "error");
                    } finally {
                        btnDaftar.innerText = "Daftar Sekarang";
                        btnDaftar.disabled = false;
                    }
                });
            }
        });
    </script>

</body>
</html>
