<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - TERAVIA</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <style>
        /* Custom Internal Style Khusus Auth Page agar Terpusat Nyaman */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
        }
        .auth-card {
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
            border: 1px solid var(--border-color);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header .logo {
            font-size: 28px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .auth-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .auth-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background-color: #FAFAFA;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: var(--accent);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        /* Password Toggle Styling */
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
        }
        .auth-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .auth-meta a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-meta a:hover {
            text-decoration: underline;
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-auth:hover {
            background-color: var(--accent-hover);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">TERA<span>VIA</span></a>
                <h1>Selamat Datang Kembali</h1>
                <p>Masuk untuk mengelola properti Anda</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="identity">Email atau Nomor WhatsApp</label>
                    <input type="text" id="identity" class="form-control" placeholder="contoh@email.com / 081234..." required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
                        <button type="button" id="toggle-password" class="toggle-password">LIHAT</button>
                    </div>
                </div>
                
                <div class="auth-meta">
                    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                        <input type="checkbox" id="remember-me"> Ingat Saya
                    </label>
                    <a href="#">Lupa Password?</a>
                </div>
                
                <button type="submit" class="btn-auth">Masuk Sekarang</button>
            </form>
            
            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar Akun</a>
            </div>
        </div>
    </div>

    <script src="assets/js/supabase-config.js" type="module"></script>
    <script src="assets/js/auth.js" type="module"></script>
    
    <script>
        // Logika Interaktif Hide/Show Password langsung di halaman
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = 'SEMBUNYIKAN';
            } else {
                passwordInput.type = 'password';
                this.textContent = 'LIHAT';
            }
        });
    </script>
</body>
</html>
