<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #0F172A;
            --accent: #0EA5E9;
            --accent-hover: #0284C7;
            --bg-main: #FAFAFA;
            --bg-surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-sans); }
        body { background-color: #F8FAFC; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        .container { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        /* NAVBAR STYLING */
        .navbar { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; padding: 12px 0; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; position: relative; }
        .logo-img { height: 40px; width: auto; display: block; }
        .nav-links { display: flex; list-style: none; gap: 32px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        .nav-actions { display: flex; align-items: center; }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; }
        .hamburger span { display: block; width: 25px; height: 3px; background-color: var(--primary); border-radius: 3px; }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 14px; cursor: pointer; }
        .btn-primary { background-color: var(--accent); color: white; border: none; }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--border-color); margin-right: 12px; }

        /* CONTENT WRAPPER */
        .auth-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 16px; }
        .auth-container { background: var(--bg-surface); border-radius: 24px; padding: 40px 32px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); width: 100%; max-width: 480px; border: 1px solid var(--border-color); }
        .auth-header h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .auth-header p { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .form-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input { padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 10px; outline: none; background-color: #F8FAFC; width: 100%; }
        
        .password-field-wrapper { position: relative; display: flex; align-items: center; }
        .password-field-wrapper input { padding-right: 48px; }
        .toggle-password-btn { position: absolute; right: 16px; color: var(--text-muted); cursor: pointer; }

        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 14px; }
        .form-options a { color: var(--accent); text-decoration: none; }
        .btn-submit { background-color: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; }

        .auth-redirect { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 24px; }
        .auth-redirect a { color: var(--accent); text-decoration: none; font-weight: 600; }

        @media (max-width: 768px) {
            .nav-links, .nav-actions { display: none; }
            .hamburger { display: flex; }
            .nav-links.active { display: flex !important; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-surface); padding: 20px; border-bottom: 1px solid var(--border-color); gap: 16px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container container">
            <a href="index.html">
                <img src="./assets/img/logo.png" alt="TERAVIA Logo" class="logo-img">
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="pages/jual.html">Jual</a></li>
                <li><a href="pages/beli.html">Beli</a></li>
                <li><a href="pages/sewa.html">Sewa</a></li>
                <li><a href="pages/blog.html">Blog</a></li>
                <li><a href="pages/tentang.html">Tentang Kami</a></li>
            </ul>
            <div class="hamburger" id="hamburgerMenu">
                <span></span><span></span><span></span>
            </div>
            <div class="nav-actions">
                <a href="register.html" class="btn btn-outline">DAFTAR</a>
                <a href="login.html" class="btn btn-primary">MASUK</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Selamat Datang</h2>
                <p>Akses akun Anda untuk mengelola properti impian.</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye-slash toggle-password-btn" id="toggle-login-pass"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label><input type="checkbox"> Ingat Saya</label>
                    <a href="#">Lupa Sandi?</a>
                </div>
                <button type="submit" class="btn-submit">MASUK SEKARANG</button>
            </form>
            <p class="auth-redirect">Belum memiliki akun? <a href="register.html">Daftar Akun</a></p>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburgerMenu');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => { navLinks.classList.toggle('active'); });

        const passField = document.getElementById('login-password');
        const toggleIcon = document.getElementById('toggle-login-pass');
        toggleIcon.addEventListener('click', () => {
            if (passField.type === 'password') {
                passField.type = 'text';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passField.type = 'password';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        });
    </script>
</body>
</html>
