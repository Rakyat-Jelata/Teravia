<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasang Iklan Properti - TERAVIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-blue-600 tracking-wide">TERAVIA</a>
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="index.html" class="text-slate-600 hover:text-blue-600 font-medium">Beranda</a>
                    <a href="properti.html" class="text-slate-600 hover:text-blue-600 font-medium">Properti</a>
                    <a href="blog.html" class="text-slate-600 hover:text-blue-600 font-medium">Blog</a>
                    <a href="tentang.html" class="text-slate-600 hover:text-blue-600 font-medium">Tentang</a>
                    <a href="pasang-iklan.html" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-lg text-sm font-semibold bg-blue-50">Pasang Iklan</a>
                    <a href="login.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">Masuk</a>
                </div>
                <div class="flex items-center md:hidden">
                    <button id="btn-hamburger" class="text-slate-600 hover:text-slate-900 focus:outline-none p-2">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-200 px-4 pt-2 pb-4 space-y-2 shadow-lg">
            <a href="index.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Beranda</a>
            <a href="properti.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Properti</a>
            <a href="blog.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Blog</a>
            <a href="tentang.html" class="block text-slate-600 hover:text-blue-600 py-2 font-medium">Tentang</a>
            <a href="pasang-iklan.html" class="block border border-blue-600 text-blue-600 text-center py-2 rounded-lg font-medium bg-blue-50">Pasang Iklan</a>

    <div class="max-w-3xl mx-auto px-4 py-10">
        <div class="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">Formulir Pasang Iklan</h2>
                <p class="text-sm text-slate-500">Lengkapi data properti Anda dengan benar.</p>
            </div>

            <form id="form-pasang-iklan" class="space-y-5" onsubmit="return false;">
                
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-2">Judul Iklan</label>
                    <input type="text" placeholder="Contoh: Rumah Minimalis Modern Dekat Stasiun KRL" class="w-full p-3 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-2">Status Listing</label>
                    <select class="w-full p-3 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500">
                        <option value="Dijual">Dijual</option>
                        <option value="Disewakan">Disewakan</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-2">Jenis Properti</label>
                    <select id="select-jenis" class="w-full p-3 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500">
                        <option value="">-- Pilih Jenis Properti --</option>
                        <option value="rumah">Rumah / Villa</option>
                        <option value="tanah">Tanah / Sawah / Kebun</option>
                        <option value="hotel">Hotel</option>
                        <option value="perkantoran">Gedung Perkantoran</option>
                        <option value="rs">Rumah Sakit</option>
                    </select>
                </div>

                <div id="form-rs" class="hidden bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-4">
                    <h4 class="text-xs font-bold text-emerald-700 uppercase tracking-wider"><i class="fa-solid fa-hospital mr-1"></i> Detail Spesifikasi Rumah Sakit</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Luas Tanah (m²)</label>
                            <input type="number" placeholder="m²" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Luas Gedung (m²)</label>
                            <input type="number" placeholder="m²" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Tipe RS</label>
                            <select class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                                <option value="Type A">Type A</option>
                                <option value="Type B">Type B</option>
                                <option value="Type C">Type C</option>
                                <option value="Type D">Type D</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kamar VIP</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kamar Kelas 1</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kamar Kelas 2</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kamar Kelas 3</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Jumlah Ruangan</label>
                            <input type="number" placeholder="Total" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Jumlah Toilet</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                    </div>
                </div>

                <div id="form-hotel" class="hidden bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-4">
                    <h4 class="text-xs font-bold text-emerald-700 uppercase tracking-wider"><i class="fa-solid fa-hotel mr-1"></i> Detail Spesifikasi Hotel</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Jumlah Lantai</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Total Kamar</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Bintang</label>
                            <select class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                                <option value="Non Bintang">Non Bintang</option>
                                <option value="Bintang 3">Bintang 3</option>
                                <option value="Bintang 5">Bintang 5</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="form-perkantoran" class="hidden bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-4">
                    <h4 class="text-xs font-bold text-emerald-700 uppercase tracking-wider"><i class="fa-solid fa-building mr-1"></i> Detail Gedung Perkantoran</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Jumlah Lantai</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Jumlah Lift</label>
                            <input type="number" placeholder="0" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                    </div>
                </div>

                <div id="form-tanah" class="hidden bg-slate-50 p-5 rounded-2xl border border-slate-200 grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Luas Tanah (m²)</label>
                        <input type="number" placeholder="m²" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Panjang (m)</label>
                        <input type="number" placeholder="m" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Lebar (m)</label>
                        <input type="number" placeholder="m" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                    </div>
                </div>

                <div id="form-rumah" class="hidden bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-4">
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Luas Tanah (m²)</label>
                            <input type="number" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Luas Bangunan (m²)</label>
                            <input type="number" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kamar Tidur</label>
                            <input type="number" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-2">Harga (Rp)</label>
                    <input type="number" placeholder="Contoh: 500000000" class="w-full p-3 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500" required>
                </div>

                <div class="bg-blue-50/50 p-5 rounded-2xl border border-blue-100 space-y-4">
                    <h4 class="text-xs font-bold text-blue-800 uppercase tracking-wider"><i class="fa-solid fa-map-location-dot mr-1"></i> Penentuan Lokasi Properti</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Provinsi</label>
                            <select id="provinsi" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500" required>
                                <option value="">-- Pilih Provinsi --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kabupaten / Kota</label>
                            <select id="kabupaten" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500" disabled required>
                                <option value="">-- Pilih Kabupaten/Kota --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kecamatan</label>
                            <select id="kecamatan" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500" disabled required>
                                <option value="">-- Pilih Kecamatan --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kelurahan / Desa</label>
                            <select id="kelurahan" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500" disabled required>
                                <option value="">-- Pilih Kelurahan/Desa --</option>
                            </select>
                        </div>
                    </div>

                    <div class="max-w-[200px]">
                        <label class="block text-[10px] font-bold text-slate-600 uppercase mb-1">Kode Pos</label>
                        <input type="number" placeholder="Contoh: 15310" class="w-full p-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700">
                    Tayangkan Iklan
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // ========================================================
            // 1. LOGIKA HAMBURGER MENU (LANGSUNG AKTIF DAN RESPONSIF)
            // ========================================================
            const btnHamburger = document.getElementById("btn-hamburger");
            const mobileMenu = document.getElementById("mobile-menu");

            if (btnHamburger && mobileMenu) {
                btnHamburger.addEventListener("click", (e) => {
                    e.stopPropagation();
                    mobileMenu.classList.toggle("hidden");
                });

                document.addEventListener("click", (e) => {
                    if (!mobileMenu.classList.contains("hidden") && !mobileMenu.contains(e.target) && e.target !== btnHamburger) {
                        mobileMenu.classList.add("hidden");
                    }
                });
            }

            // ========================================================
            // 2. LOGIKA DETAIL PROPERTI KONDISIONAL
            // ========================================================
            const selectJenis = document.getElementById("select-jenis");
            const formDetailIds = ["form-rumah", "form-tanah", "form-hotel", "form-perkantoran", "form-rs"];

            selectJenis.addEventListener("change", (e) => {
                const targetValue = e.target.value;
                formDetailIds.forEach(id => {
                    document.getElementById(id).classList.add("hidden");
                });
                if (targetValue) {
                    const selectedForm = document.getElementById(`form-${targetValue}`);
                    if (selectedForm) selectedForm.classList.remove("hidden");
                }
            });

            // ========================================================
            // 3. LOGIKA API WILAYAH CDN GLOBAL JSDELIVR (MURNI & STABIL)
            // ========================================================
            const baseUrl = "https://cdn.jsdelivr.net/gh/fajarghifar/api-wilayah-indonesia@master/api";
            
            const selectProv = document.getElementById("provinsi");
            const selectKab = document.getElementById("kabupaten");
            const selectKec = document.getElementById("kecamatan");
            const selectKel = document.getElementById("kelurahan");

            // Load Provinsi
            fetch(`${baseUrl}/provinces.json`)
                .then(res => {
                    if (!res.ok) throw new Error("Gagal mengambil data");
                    return res.json();
                })
                .then(data => {
                    data.sort((a, b) => a.name.localeCompare(b.name));
                    data.forEach(prov => {
                        let opt = document.createElement("option");
                        opt.value = prov.id;
                        opt.textContent = prov.name;
                        selectProv.appendChild(opt);
                    });
                }).catch(err => console.error("API Prov Error:", err));

            // Provinsi -> Kabupaten
            selectProv.addEventListener("change", (e) => {
                const provId = e.target.value;
                selectKab.innerHTML = '<option value="">-- Pilih Kabupaten/Kota --</option>';
                selectKec.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
                selectKel.innerHTML = '<option value="">-- Pilih Kelurahan/Desa --</option>';
                selectKab.disabled = true; selectKec.disabled = true; selectKel.disabled = true;

                if (provId) {
                    fetch(`${baseUrl}/regencies/${provId}.json`)
                        .then(res => res.json())
                        .then(data => {
                            data.sort((a, b) => a.name.localeCompare(b.name));
                            data.forEach(kab => {
                                let opt = document.createElement("option");
                                opt.value = kab.id;
                                opt.textContent = kab.name;
                                selectKab.appendChild(opt);
                            });
                            selectKab.disabled = false;
                        }).catch(err => console.error(err));
                }
            });

            // Kabupaten -> Kecamatan
            selectKab.addEventListener("change", (e) => {
                const kabId = e.target.value;
                selectKec.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
                selectKel.innerHTML = '<option value="">-- Pilih Kelurahan/Desa --</option>';
                selectKec.disabled = true; selectKel.disabled = true;

                if (kabId) {
                    fetch(`${baseUrl}/districts/${kabId}.json`)
                        .then(res => res.json())
                        .then(data => {
                            data.sort((a, b) => a.name.localeCompare(b.name));
                            data.forEach(kec => {
                                let opt = document.createElement("option");
                                opt.value = kec.id;
                                opt.textContent = kec.name;
                                selectKec.appendChild(opt);
                            });
                            selectKec.disabled = false;
                        }).catch(err => console.error(err));
                }
            });

            // Kecamatan -> Kelurahan
            selectKec.addEventListener("change", (e) => {
                const kecId = e.target.value;
                selectKel.innerHTML = '<option value="">-- Pilih Kelurahan/Desa --</option>';
                selectKel.disabled = true;

                if (kecId) {
                    fetch(`${baseUrl}/villages/${kecId}.json`)
                        .then(res => res.json())
                        .then(data => {
                            data.sort((a, b) => a.name.localeCompare(b.name));
                            data.forEach(kel => {
                                let opt = document.createElement("option");
                                opt.value = kel.id;
                                opt.textContent = kel.name;
                                selectKel.appendChild(opt);
                            });
                            selectKel.disabled = false;
                        }).catch(err => console.error(err));
                }
            });
        });
    </script>
</body>
</html>
